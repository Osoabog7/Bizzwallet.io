<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Cooperative membership</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>PH Cooperative membership</h2>
        <form id="membershipForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="address" id="address" placeholder="Address" required>
    <input type="occupation" id="occupation" placeholder="occupation" required>
    
    <label for="signature">Signature:</label>
    <canvas id="signature-pad" width="1000" height="100" style="border:1px solid #000;"></canvas>
    <button type="button" id="clear-signature">Clear</button>
    <input type="hidden" id="signature-data" name="signature-data">
    <input type="date" id="date" required>
    <input type="text" id="referral" placeholder="Referral" readonly>    <label>
    <input type="checkbox" id="agreement" required> I agree to the 
    <a href="terms.html" target="_blank">Terms & Conditions</a>
    </label>
    <button type="submit">Submit</button>
</form>

        <p id="responseMessage"></p>
    </div>
    <script defer src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            function generateReferralCode() {
                return "REF-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            }
            document.getElementById("referral").value = generateReferralCode();
        });
    </script>
</body>
</html>
